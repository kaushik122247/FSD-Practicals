name: Exp10 CI

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read
  packages: write

concurrency:
  group: exp10-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-test-build:
    name: Frontend | Test + Build + Artifact
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    if: ${{ hashFiles('frontend/package.json') != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run tests
        run: npm test --if-present

      - name: Build production bundle
        run: npm run build --if-present

      - name: Upload frontend artifact
        if: ${{ hashFiles('frontend/dist/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

  backend-test-build:
    name: Backend | Test + Build + Artifact
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    if: ${{ hashFiles('backend/pom.xml') != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run backend tests
        run: mvn -B test

      - name: Build JAR
        run: mvn -B -DskipTests package

      - name: Upload backend JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          if-no-files-found: error

  docker-publish:
    name: Docker | Build + Push to GHCR
    runs-on: ubuntu-latest
    needs:
      - frontend-test-build
      - backend-test-build
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (hashFiles('backend/Dockerfile') != '' || hashFiles('frontend/Dockerfile') != '')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        if: ${{ hashFiles('backend/Dockerfile') != '' }}
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/exp10-backend:latest
            ghcr.io/${{ github.repository_owner }}/exp10-backend:${{ github.sha }}

      - name: Build and push frontend image
        if: ${{ hashFiles('frontend/Dockerfile') != '' }}
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/exp10-frontend:latest
            ghcr.io/${{ github.repository_owner }}/exp10-frontend:${{ github.sha }}
